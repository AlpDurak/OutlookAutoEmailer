# Azure App Registration
azure.client.id=YOUR_CLIENT_ID_HERE
azure.tenant.id=YOUR_TENANT_ID_HERE

# SMTP (sender account)
smtp.host=smtp.office365.com
smtp.port=587
smtp.starttls.enabled=true

# Rate limiting
rate.limit.emails.per.hour=100
rate.limit.delay.min.ms=3000
rate.limit.delay.max.ms=8000

# Retry
retry.max.attempts=3
retry.backoff.multiplier=2

# Logging
logging.level=INFO
